<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/><line x1="440" y1="0" x2="440" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/><line x1="520" y1="0" x2="520" y2="300"/>
    <line x1="560" y1="0" x2="560" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="640" y1="0" x2="640" y2="300"/><line x1="680" y1="0" x2="680" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/><line x1="760" y1="0" x2="760" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/><line x1="840" y1="0" x2="840" y2="300"/>
    <line x1="880" y1="0" x2="880" y2="300"/><line x1="920" y1="0" x2="920" y2="300"/>
    <line x1="960" y1="0" x2="960" y2="300"/><line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1040" y1="0" x2="1040" y2="300"/><line x1="1080" y1="0" x2="1080" y2="300"/>
    <line x1="1120" y1="0" x2="1120" y2="300"/><line x1="1160" y1="0" x2="1160" y2="300"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Decorative nodes -->
  <g opacity="0.15">
    <circle cx="150" cy="80" r="3" fill="#6366f1"/>
    <circle cx="300" cy="220" r="2" fill="#8b5cf6"/>
    <circle cx="900" cy="60" r="3" fill="#6366f1"/>
    <circle cx="1050" cy="240" r="2" fill="#8b5cf6"/>
    <circle cx="180" cy="200" r="2" fill="#a78bfa"/>
    <circle cx="1020" cy="100" r="2" fill="#a78bfa"/>
    <line x1="150" y1="80" x2="300" y2="220" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="900" y1="60" x2="1050" y2="240" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="150" y1="80" x2="180" y2="200" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="900" y1="60" x2="1020" y2="100" stroke="#a78bfa" stroke-width="0.5"/>
  </g>

  <!-- Agent icon -->
  <g transform="translate(480, 85)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#accent)" opacity="0.9"/>
    <path d="M24 10 L24 18 M16 22 L32 22 M12 30 L20 26 L28 26 L36 30 M18 34 L18 38 M30 34 L30 38" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Title -->
  <text x="540" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    My Agents
  </text>

  <!-- Subtitle -->
  <text x="600" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">
    Autonomous AI agents for browser automation and productivity
  </text>

  <!-- Accent line -->
  <rect x="440" y="175" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Tags -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#a1a1aa">
    <rect x="390" y="195" width="80" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <text x="430" y="211" text-anchor="middle">MCP</text>
    <rect x="485" y="195" width="100" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <text x="535" y="211" text-anchor="middle">Firefox</text>
    <rect x="600" y="195" width="100" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <text x="650" y="211" text-anchor="middle">Claude API</text>
    <rect x="715" y="195" width="100" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <text x="765" y="211" text-anchor="middle">Automation</text>
  </g>

  <!-- Author -->
  <text x="600" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#71717a" text-anchor="middle">
    by Elliot Sones
  </text>
</svg>
