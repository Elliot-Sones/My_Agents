<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude Browser Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Claude Browser Bridge</h1>
      <div class="status-row">
        <span id="status-dot" class="dot disconnected"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </header>

    <section class="config">
      <div class="field">
        <label for="secret-input">Secret</label>
        <div class="input-row">
          <input type="password" id="secret-input" placeholder="Enter auth secret">
          <button id="toggle-secret" title="Show/Hide">&#128065;</button>
        </div>
      </div>
      <div class="field">
        <label for="port-input">Port</label>
        <input type="number" id="port-input" value="7865" min="1" max="65535">
      </div>
      <button id="save-btn" class="primary">Save &amp; Reconnect</button>
    </section>

    <section class="tabs-section">
      <h2>Claude Tabs <span id="tab-count">(0)</span></h2>
      <ul id="tab-list"></ul>
      <button id="close-all-btn" class="danger" disabled>Close All Claude Tabs</button>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
